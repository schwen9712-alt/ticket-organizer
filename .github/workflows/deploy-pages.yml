# Ticket Organizer — GitHub Pages 部署（官方 Actions 通道）
# 替代默认的 "pages build and deployment"（该通道 deploy 步骤持续失败）。
# 每次 push 到 main 自动运行；也可在 Actions 页手动触发（workflow_dispatch）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 允许在 Actions 页面手动点 Run workflow

# 官方 Pages 部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的顶掉旧的排队
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 整个仓库根目录就是站点（单文件 index.html 应用）
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
